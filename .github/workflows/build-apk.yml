name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Generate Android icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp android-resources/icon-48.png  android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp android-resources/icon-72.png  android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android-resources/icon-96.png  android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp android-resources/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android-resources/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp android-resources/icon-48.png  android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android-resources/icon-72.png  android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android-resources/icon-96.png  android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android-resources/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android-resources/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Patch app name in strings.xml
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">SGC Normas</string>|' android/app/src/main/res/values/strings.xml || true
          sed -i 's|<string name="title_activity_main">.*</string>|<string name="title_activity_main">SGC Normas</string>|' android/app/src/main/res/values/strings.xml || true

      - name: Build Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SGC-Normas-v1.0.0.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SGC-Normas-APK
          path: artifacts/SGC-Normas-v1.0.0.apk
          retention-days: 90
